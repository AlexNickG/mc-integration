stages:
  - quality
  - build
  - deploy

variables:
  IMAGE_NAME: mc-integration

cache:
  paths:
    - .m2/repository/

# ---------- QUALITY ----------
# Требует переменную SONAR_TOKEN (masked/protected) в Settings > CI/CD > Variables проекта.

quality:
  stage: quality
  tags:
    - mc-integration-deploy
  script:
    - mvn clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
        -Dsonar.token=$SONAR_TOKEN
        -Dsonar.qualitygate.wait=true
  artifacts:
    paths:
      - target/site/jacoco/
    expire_in: 1 week

# ---------- BUILD ----------

build:
  stage: build
  tags:
    - mc-integration-deploy
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

# ---------- DEPLOY ----------

deploy:
  stage: deploy
  tags:
    - mc-integration-deploy
  dependencies:
    - build
  script:
    - ls -la target
    - docker build -t mc-integration:latest .
    - docker compose -f docker/docker-compose.prod.yml up -d --force-recreate
  only:
    - develop
    - feature/pipelineBugFix
